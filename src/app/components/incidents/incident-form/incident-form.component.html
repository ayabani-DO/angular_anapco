<app-sidebar></app-sidebar>

<div class="site-form-container">
  <div class="header">
    <h2>
      <i class="fas fa-link"></i>
      Affect Incident to Site
    </h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <form [formGroup]="affectForm" (ngSubmit)="onSubmit()" class="form-card">

    <div class="form-row">
      <div class="form-group">
        <label for="incidentId">Incident ID *</label>
        <input id="incidentId" type="number" formControlName="incidentId" placeholder="Enter incident ID">
        <span class="error" *ngIf="affectForm.get('incidentId')?.touched && affectForm.get('incidentId')?.invalid">
          Incident ID is required
        </span>
      </div>

      <div class="form-group">
        <label for="siteId">Target Site *</label>
        <select id="siteId" formControlName="siteId">
          <option [ngValue]="null">-- Select a site --</option>
          <option *ngFor="let site of sites" [ngValue]="site.idSite">{{ site.nom }}</option>
        </select>
        <span class="error" *ngIf="affectForm.get('siteId')?.touched && affectForm.get('siteId')?.invalid">
          Site is required
        </span>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
        Affect
      </button>
    </div>
  </form>
</div>
