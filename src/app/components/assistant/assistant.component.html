<app-sidebar></app-sidebar>

<div class="assistant-page">
  <div class="header">
    <h2><i class="fas fa-comments"></i> AI Assistant</h2>
    <span class="header-subtitle">Ask operational questions and get quick actionable insights</span>
  </div>

  <div class="assistant-card">
    <div class="assistant-intro">
      <div class="assistant-intro-icon"><i class="fas fa-robot"></i></div>
      <div>
        <div class="assistant-intro-title">ANAPCO Copilot</div>
        <div class="assistant-intro-subtitle">Connected to real-time backend intelligence and ML signals.</div>
      </div>
    </div>

    <div class="suggestions-row">
      <button
        class="suggestion-chip"
        *ngFor="let suggestion of quickSuggestions"
        (click)="askSuggestion(suggestion)"
        [disabled]="loading"
      >
        {{ suggestion }}
      </button>
    </div>

    <div #messagesContainer class="messages-container">
      <div class="message" *ngFor="let message of messages; trackBy: trackByMessageId" [ngClass]="message.sender">
        <div class="message-bubble" [ngClass]="{ 'error': message.isError }">
          <div class="message-text">{{ message.text }}</div>

          <div class="data-summary" *ngIf="message.response && formatDataSummary(message.response.data).length > 0">
            <div class="summary-title">Data Summary</div>
            <ul>
              <li *ngFor="let item of formatDataSummary(message.response?.data)">{{ item }}</li>
            </ul>
          </div>

          <div class="response-suggestions" *ngIf="message.response?.suggestions?.length">
            <button
              class="suggestion-chip light"
              *ngFor="let item of message.response?.suggestions"
              (click)="askSuggestion(item)"
              [disabled]="loading"
            >
              {{ item }}
            </button>
          </div>

          <div class="message-meta">{{ message.timestamp | date: 'shortTime' }}</div>
        </div>
      </div>

      <div *ngIf="loading" class="message assistant loading-message">
        <div class="message-bubble loading-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="loading-label">Assistant is typing...</span>
        </div>
      </div>
    </div>

    <div *ngIf="chatError" class="chat-error">
      <i class="fas fa-exclamation-circle"></i> {{ chatError }}
    </div>

    <div class="chat-input-row">
      <textarea
        [(ngModel)]="prompt"
        placeholder="Ask about incidents, risks, costs, weather or operations..."
        rows="2"
        (keydown)="onKeyDown($event)"
        [disabled]="loading"
      ></textarea>
      <button class="send-btn" (click)="sendMessage()" [disabled]="loading || !prompt.trim()">
        <i class="fas fa-paper-plane"></i>
        Send
      </button>
    </div>
  </div>
</div>
