<app-sidebar></app-sidebar>

<div class="site-list-container">
  <div class="header">
    <h2><i class="fas fa-wallet"></i> Budgets Mensuels</h2>
    <button class="btn btn-primary" (click)="goToCreate()">
      <i class="fas fa-plus"></i> New Budget
    </button>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="loading" class="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading budgets...
  </div>

  <div *ngIf="!loading && budgets.length === 0" class="empty-state">
    <i class="fas fa-wallet"></i>
    <p>No budgets found.</p>
  </div>

  <table *ngIf="!loading && budgets.length > 0" class="sites-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Year</th>
        <th>Month</th>
        <th>Amount</th>
        <th>Site</th>
        <th>Currency</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let b of budgets">
        <td>{{ b.id }}</td>
        <td>{{ b.year }}</td>
        <td>{{ b.month }}</td>
        <td>{{ b.amount | number:'1.2-2' }}</td>
        <td>{{ b.site?.nom || '—' }}</td>
        <td>{{ b.currencyCode || '—' }}</td>
        <td class="actions">
          <button class="btn-icon" title="Edit" (click)="goToEdit(b.id!)">
            <i class="fas fa-edit"></i>
          </button>
          <button class="btn-icon btn-danger" title="Delete" (click)="deleteBudget(b.id!)">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
