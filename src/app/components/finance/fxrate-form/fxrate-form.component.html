<app-sidebar></app-sidebar>

<div class="site-form-container">
  <div class="header">
    <h2>
      <i class="fas" [ngClass]="isEditMode ? 'fa-edit' : 'fa-plus-circle'"></i>
      {{ isEditMode ? 'Edit FX Rate' : 'Create FX Rate' }}
    </h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="loading && isEditMode" class="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>

  <form *ngIf="!loading || !isEditMode" [formGroup]="fxRateForm" (ngSubmit)="onSubmit()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label for="fromCurrency">From Currency *</label>
        <select id="fromCurrency" formControlName="fromCurrency">
          <option *ngFor="let c of validCurrencies" [value]="c">{{ c }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="toCurrency">To Currency *</label>
        <select id="toCurrency" formControlName="toCurrency">
          <option value="" disabled>-- Select --</option>
          <option *ngFor="let c of validCurrencies" [value]="c">{{ c }}</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="rate">Rate *</label>
        <input id="rate" type="number" formControlName="rate" step="0.000001">
      </div>
      <div class="form-group">
        <label for="year">Year *</label>
        <input id="year" type="number" formControlName="year" min="2000" max="2099">
      </div>
      <div class="form-group">
        <label for="month">Month *</label>
        <input id="month" type="number" formControlName="month" min="1" max="12">
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ isEditMode ? 'Update' : 'Create' }}
      </button>
    </div>
  </form>
</div>
