<app-sidebar></app-sidebar>

<div class="site-form-container">
  <div class="header">
    <h2>
      <i class="fas" [ngClass]="isEditMode ? 'fa-edit' : 'fa-plus-circle'"></i>
      {{ isEditMode ? 'Edit Expense' : 'Create Expense' }}
    </h2>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="loading && isEditMode" class="loading">
    <i class="fas fa-spinner fa-spin"></i> Loading...
  </div>

  <form *ngIf="!loading || !isEditMode" [formGroup]="expenseForm" (ngSubmit)="onSubmit()" class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label for="amount">Amount *</label>
        <input id="amount" type="number" formControlName="amount" step="0.01">
      </div>
      <div class="form-group">
        <label for="date">Date *</label>
        <input id="date" type="date" formControlName="date">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" formControlName="category">
          <option *ngFor="let c of categoryOptions" [value]="c">{{ c }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="currencyCode">Currency Code</label>
        <input id="currencyCode" formControlName="currencyCode" placeholder="e.g. EUR">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="siteId">Site</label>
        <select id="siteId" formControlName="siteId">
          <option [ngValue]="null">-- No site --</option>
          <option *ngFor="let site of sites" [ngValue]="site.idSite">{{ site.nom }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ isEditMode ? 'Update' : 'Create' }}
      </button>
    </div>
  </form>
</div>
